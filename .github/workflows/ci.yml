name: CI/CD for YMC-toolkit

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2 with MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-binutils
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-cmake
            make
            git
            zip

      - name: Compile with MinGW
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE"
          
          # 如果存在 resource.rc 则编译，否则跳过
          if [ -f resource.rc ]; then
            windres resource.rc -O coff -o resource.res
          else
            touch resource.res
          fi
          
          g++ -std=c++17 -Wall -Wextra -g3 -Iinclude -I. src/*.cpp resource.res -o YMC-toolkit.exe \
            -lws2_32 -lwininet -lgdi32 -lcomctl32 -lgdiplus -lcrypt32 -lole32 -mwindows
          
          if [ ! -f YMC-toolkit.exe ]; then
            echo "Build failed: YMC-toolkit.exe not found"
            exit 1
          fi
          
          echo "Build succeeded."

      - name: Prepare release artifacts
        shell: msys2 {0}
        run: |
          mkdir -p YMC-toolkit_Package
          cp YMC-toolkit.exe YMC-toolkit_Package/
          cp config.json YMC-toolkit_Package/ 2>/dev/null || echo "config.json not found, skipping"
          cp prompt_template.json YMC-toolkit_Package/ 2>/dev/null || echo "prompt_template.json not found, skipping"
          cp start_game.bat YMC-toolkit_Package/ 2>/dev/null || echo "start_game.bat not found, skipping"
          cd YMC-toolkit_Package
          zip -r ../YMC-toolkit-Windows.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YMC-toolkit-Windows
          path: YMC-toolkit-Windows.zip

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## YMC-toolkit ${{ github.ref_name }}
            自动构建的 Windows 可执行文件。
            下载后解压，运行 `YMC-toolkit.exe` 即可。
          files: YMC-toolkit-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}